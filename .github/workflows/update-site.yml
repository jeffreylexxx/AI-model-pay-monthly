name: Update AI model subscription site

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pricing update
        run: node scripts/update-pricing.mjs

      - name: Build site
        run: node scripts/build-site.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/models.json data/meta.json index.html
          git diff --cached --quiet || git commit -m "chore: daily pricing refresh"
          git push
